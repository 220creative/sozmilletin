name: Haberleri Otomatik Çek

# 6 saatte bir otomatik çalışır + elle tetiklenebilir.
# Scraper haberleri çeker, scrapedNews.json'u repoya commit'ler.
# [skip netlify] etiketi sayesinde Netlify build TETIKLENMEZ — build kredisi harcanmaz.
# Netlify deploy ayrı bir günlük workflow (deploy.yml) ile yapılır.
on:
  schedule:
    - cron: '0 */6 * * *'  # 6 saatte bir (UTC: 00:00, 06:00, 12:00, 18:00)
  workflow_dispatch:        # Actions sekmesinden elle çalıştırma

# Bot'un repoya commit atabilmesi için yazma izni
permissions:
  contents: write

# Aynı anda birden fazla tarama çakışmasın
concurrency:
  group: scrape-news
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu çek
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Bağımlılıkları yükle
        run: npm ci

      - name: Haberleri çek
        run: npm run scrape

      - name: Değişiklik varsa commit'le ve push'la
        run: |
          git config user.name "sozmilletin-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/scrapedNews.json
          if git diff --staged --quiet; then
            echo "Yeni haber yok — commit atlanıyor."
          else
            git commit -m "chore: otomatik haber güncellemesi [skip netlify]"
            git push
            echo "Haberler güncellendi ve push'landı."
          fi
