name: Haber Çek, Derle ve Natro'ya Yayınla

# Her 6 saatte bir otomatik çalışır + elle tetiklenebilir.
# GitHub Actions public repolar için TAMAMEN ÜCRETSİZ ve sınırsızdır.
# Netlify'a hiç gerek kalmaz.
on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */3 * * *'   # 3 saatte bir (UTC 00:00, 03:00, 06:00, 09:00...)
  workflow_dispatch:         # GitHub Actions sekmesinden elle çalıştırma

permissions:
  contents: write

concurrency:
  group: scrape-deploy
  cancel-in-progress: false

jobs:
  scrape-build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu çek
        uses: actions/checkout@v5

      - name: Node.js 22 kur
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Bağımlılıkları yükle
        run: npm ci

      - name: Haberleri çek (scraper)
        run: npm run scrape

      - name: Güncel JSON'u repoya kaydet (yedek amaçlı)
        run: |
          git config user.name "sozmilletin-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/scrapedNews.json
          if git diff --staged --quiet; then
            echo "Yeni haber yok — commit atlanıyor."
          else
            git commit -m "chore: otomatik haber güncellemesi [skip netlify]"
            git push
            echo "JSON güncellendi."
          fi

      - name: React uygulamasını derle
        run: npm run build

      - name: Natro'ya FTP ile yayınla
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          dangerous-clean-slate: false   # Mevcut dosyaları silmeden günceller
